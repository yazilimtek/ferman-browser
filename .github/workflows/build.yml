name: CI Build

on:
  push:
    branches: [ main, develop ]
    tags-ignore: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libsqlite3-dev \
            libsoup-3.0-dev \
            libpoppler-glib-dev \
            libzip-dev \
            pkg-config \
            ninja-build

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Check binary
        run: |
          ls -lh build/ferman-browser
          file build/ferman-browser

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferman-browser-linux-amd64
          path: build/ferman-browser
          retention-days: 7
